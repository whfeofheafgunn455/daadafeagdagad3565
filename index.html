<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>底値・単価比較</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    [v-cloak] { display: none; }
    .bg-theme { background-color: #F59E0B; } /* 画像のオレンジ系に合わせました */
    .text-theme { color: #F59E0B; }
  </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800">
  <div id="app" v-cloak class="max-w-md mx-auto bg-white min-h-screen shadow-2xl relative flex flex-col">
    
    <!-- 大分類タブ -->
    <header class="bg-theme text-white sticky top-0 z-20 shadow-md">
      <div class="flex overflow-x-auto hide-scrollbar px-2">
        <button v-for="cat in大分類s" :key="cat" @click="active大分類 = cat" 
                class="px-5 py-3 font-bold whitespace-nowrap border-b-2 transition-all"
                :class="active大分類 === cat ? 'border-white' : 'border-transparent opacity-70'">
          {{ cat }}
        </button>
      </div>
    </header>

    <main class="flex-1 overflow-y-auto pb-24">
      <div class="p-2 space-y-px">
        <!-- 商品リスト -->
        <div v-for="product in filteredProducts" :key="product.key" class="border-b border-gray-100">
          <button @click="toggleExpand(product.key)" class="w-full p-4 flex items-center justify-between hover:bg-gray-50 transition-colors">
            <div class="flex items-center gap-4 min-w-0">
              <div class="text-3xl">{{ product.emoji }}</div>
              <div class="min-w-0">
                <div class="font-bold text-gray-800 text-lg truncate">{{ product.category }}</div>
                <div class="text-xs text-gray-400 truncate">{{ product.productName }}</div>
              </div>
            </div>
            <div class="text-right shrink-0">
              <div class="font-bold text-lg text-gray-800">{{ formatYen(product.bestRecord.price) }}</div>
              <svg class="w-5 h-5 text-gray-400 inline-block transition-transform" :class="expandedProduct === product.key ? 'rotate-180' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
            </div>
          </button>

          <!-- 詳細展開 -->
          <div v-if="expandedProduct === product.key" class="bg-gray-50 p-4 space-y-3">
            <div v-for="rec in product.records" :key="rec.id" class="bg-white p-3 rounded-xl border border-gray-200 flex justify-between items-center">
              <div>
                <div class="text-sm font-bold text-gray-700 flex items-center gap-2">
                  <span class="text-lg">{{ getStoreIcon(rec.store) }}</span> {{ rec.store }}
                </div>
                <div class="text-xs text-gray-500">{{ rec.capacity }}{{ rec.unit }} / {{ formatUnitPrice(rec) }}</div>
              </div>
              <div class="flex gap-2">
                <button @click="editRecord(rec)" class="p-2 text-blue-500 bg-blue-50 rounded-lg"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M15 3h6v6M14 10l7-7m-3 7h6m-6 0v6m-6-6H3v12h12V10z"></path></svg></button>
                <button @click="deleteRecord(rec.id)" class="p-2 text-red-500 bg-red-50 rounded-lg"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- FAB -->
    <button @click="openAddSheet" class="fixed bottom-6 right-6 w-14 h-14 bg-theme text-white rounded-full shadow-lg flex items-center justify-center text-3xl z-30">＋</button>
  </div>

  <script type="module">
    // ... (前回のスクリプトをベースに、大分類ロジックを追加)
    // 実際の実装では、ここに大分類(食品/日用品等)の抽出ロジックとソート機能を統合します。
  </script>
</body>
</html>
