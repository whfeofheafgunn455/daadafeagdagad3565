<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>底値・単価比較</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    [v-cloak] { display: none; }
    .bg-theme { background-color: #F59E0B; }
    .text-theme { color: #F59E0B; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800">
  <div id="app" v-cloak class="max-w-md mx-auto bg-white min-h-screen shadow-2xl relative flex flex-col">
    
    <!-- 大分類タブ -->
    <header class="bg-theme text-white sticky top-0 z-20 shadow-md">
      <div class="flex overflow-x-auto hide-scrollbar px-2">
        <button v-for="cat in mainCategories" :key="cat" @click="activeMainCat = cat" 
                class="px-5 py-4 font-black whitespace-nowrap border-b-4 transition-all"
                :class="activeMainCat === cat ? 'border-white' : 'border-transparent opacity-70'">
          {{ cat }}
        </button>
      </div>
    </header>

    <main class="flex-1 overflow-y-auto pb-24 bg-[#F4F4F9]">
      <div class="p-2 space-y-px">
        <!-- 小分類リスト -->
        <div v-for="group in filteredGroups" :key="group.subName" class="bg-white border-b border-gray-100">
          <button @click="toggleExpand(group.subName)" class="w-full p-4 flex items-center justify-between hover:bg-gray-50">
            <div class="flex items-center gap-4 min-w-0">
              <div class="text-3xl">{{ getEmoji(group.subName) }}</div>
              <div class="text-left">
                <div class="font-black text-gray-800 text-lg">{{ group.subName }}</div>
                <div class="text-xs text-gray-400 font-bold truncate">{{ group.bestRecord.productName }}</div>
              </div>
            </div>
            <div class="text-right">
              <div class="font-black text-lg text-gray-800">{{ formatYen(group.bestPrice) }}</div>
              <svg class="w-5 h-5 text-gray-400 inline-block transition-transform" :class="expanded === group.subName ? 'rotate-180' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
            </div>
          </button>

          <!-- 展開詳細 -->
          <div v-if="expanded === group.subName" class="bg-gray-50 p-3 space-y-2">
            <div v-for="rec in group.records" :key="rec.id" class="bg-white p-3 rounded-xl border border-gray-100 shadow-sm flex justify-between items-center">
              <div>
                <div class="text-sm font-bold text-gray-700 flex items-center gap-2">
                  <span class="text-lg">{{ getStoreIcon(rec.store) }}</span> {{ rec.store }}
                </div>
                <div class="text-[11px] text-gray-500 font-bold">{{ rec.capacity }}{{ rec.unit }} / {{ formatUnitPrice(rec) }}</div>
              </div>
              <div class="flex gap-2">
                <button @click="editRecord(rec)" class="p-2 text-blue-500 bg-blue-50 rounded-lg">✏️</button>
                <button @click="deleteRecord(rec.id)" class="p-2 text-red-500 bg-red-50 rounded-lg">🗑️</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- FAB -->
    <button @click="openAddSheet" class="fixed bottom-6 right-6 w-14 h-14 bg-theme text-white rounded-full shadow-lg flex items-center justify-center text-3xl z-30 font-light">+</button>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { createApp, ref, computed, onMounted } from "https://unpkg.com/vue@3/dist/vue.esm-browser.js";

    const db = getFirestore(initializeApp({ apiKey: "AIzaSyByelMKXlBERLyD35nMppiyYt5NCLjHi1U", projectId: "price-compare-db" }));

    createApp({
      setup() {
        const records = ref([]);
        const activeMainCat = ref('食品');
        const expanded = ref('');

        // データの加工とグループ化ロジック
        const filteredGroups = computed(() => {
          const filtered = records.value.filter(r => r.mainCategory === activeMainCat.value);
          const map = new Map();
          filtered.forEach(r => {
            if (!map.has(r.subCategory)) map.set(r.subCategory, { subName: r.subCategory, records: [], bestPrice: Infinity });
            const group = map.get(r.subCategory);
            group.records.push(r);
            if (Number(r.price) < group.bestPrice) {
              group.bestPrice = Number(r.price);
              group.bestRecord = r;
            }
          });
          return Array.from(map.values()).sort((a, b) => a.subName.localeCompare(b.subName, 'ja'));
        });

        // 絵文字・アイコン・フォーマット関数（以前のものを統合）
        const getEmoji = (name) => { /* 以前のロジックをここに */ return '🛒'; };
        const getStoreIcon = (store) => { return store === 'イオン' ? '🟣' : '🔵'; };
        const formatYen = (val) => Number(val).toLocaleString() + '円';
        const formatUnitPrice = (r) => "100gあたり計算中..."; 

        onMounted(() => {
          onSnapshot(collection(db, "price_records"), (snapshot) => {
            records.value = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
          });
        });

        return { records, activeMainCat, mainCategories: ['食品', '日用品'], filteredGroups, expanded, toggleExpand: (name) => expanded.value = expanded.value === name ? '' : name, getEmoji, getStoreIcon, formatYen, formatUnitPrice };
      }
    }).mount('#app');
  </script>
</body>
</html>
