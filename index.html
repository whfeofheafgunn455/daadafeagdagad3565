<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>底値・単価比較</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    [v-cloak] { display: none; }
    .fade-enter-active, .fade-leave-active { transition: opacity 0.2s ease; }
    .fade-enter-from, .fade-leave-to { opacity: 0; }
    .slide-enter-active, .slide-leave-active { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .slide-enter-from { transform: translateY(100%); }
    .slide-leave-to { transform: translateY(100%); }
    .bg-theme { background-color: #F59E0B; }
    .text-theme { color: #F59E0B; }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    input[type="search"]::-webkit-search-cancel-button { display: none; }
  </style>
</head>
<body class="bg-gray-100 font-sans text-gray-800">
  <div id="app" v-cloak class="max-w-md mx-auto bg-[#F4F4F9] min-h-screen shadow-2xl relative flex flex-col">

    <header class="bg-theme text-black px-4 pt-4 pb-0 sticky top-0 z-20 shadow-md">
      <div class="flex items-center justify-between h-12">
        <h1 class="text-2xl font-medium tracking-wide">お買い得メモ</h1>
        <div class="flex items-center gap-4">
          <button class="w-9 h-9 flex items-center justify-center">
            <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
          </button>
          <button class="w-9 h-9 flex items-center justify-center">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
          </button>
        </div>
      </div>

      <div class="mt-4 flex items-end justify-between">
        <div class="flex gap-8 overflow-x-auto hide-scrollbar pb-3">
          <button
            v-for="cat in majorCategories"
            :key="cat"
            @click="selectedMajor = cat; expandedId = ''"
            class="relative text-lg whitespace-nowrap pb-3 font-medium transition-colors"
            :class="selectedMajor === cat ? 'text-black font-bold' : 'text-black/45'"
          >
            {{ cat }}
            <span
              v-if="selectedMajor === cat"
              class="absolute left-1/2 -translate-x-1/2 -bottom-1 w-12 h-1.5 rounded-full bg-[#6B4A16]"
            ></span>
          </button>
        </div>
        <button class="w-10 h-10 flex items-center justify-center shrink-0 mb-2">
          <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6l4 2"></path>
          </svg>
        </button>
      </div>
    </header>

    <main class="flex-1 overflow-y-auto relative pb-28">
      <section class="p-4 space-y-4">
        <div class="relative sticky top-0 z-10">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
            </svg>
          </div>
          <input type="search" v-model="searchQuery" placeholder="小分類・商品名で検索"
                 class="w-full rounded-2xl border-2 border-transparent shadow-sm pl-12 pr-10 py-4 bg-white focus:border-[#F59E0B] focus:outline-none text-lg font-bold text-gray-700 transition-colors">
          <button v-if="searchQuery" @click="searchQuery = ''" class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400">
            <svg class="w-6 h-6 bg-gray-100 rounded-full p-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
          </button>
        </div>

        <div class="flex gap-2 overflow-x-auto hide-scrollbar pb-1">
          <button @click="storeFilter = 'all'" class="px-4 py-2 rounded-full font-bold text-sm shrink-0 transition-colors shadow-sm"
                  :class="storeFilter === 'all' ? 'bg-gray-800 text-white' : 'bg-white text-gray-600'">すべて</button>
          <button @click="storeFilter = 'イオン'" class="px-4 py-2 rounded-full font-bold text-sm shrink-0 transition-colors shadow-sm"
                  :class="storeFilter === 'イオン' ? 'bg-fuchsia-700 text-white' : 'bg-white text-fuchsia-700 border border-fuchsia-100'">イオン</button>
          <button @click="storeFilter = 'ウエルシア'" class="px-4 py-2 rounded-full font-bold text-sm shrink-0 transition-colors shadow-sm"
                  :class="storeFilter === 'ウエルシア' ? 'bg-blue-700 text-white' : 'bg-white text-blue-700 border border-blue-100'">ウエルシア</button>
          <button @click="storeFilter = '業務スーパー'" class="px-4 py-2 rounded-full font-bold text-sm shrink-0 transition-colors shadow-sm"
                  :class="storeFilter === '業務スーパー' ? 'bg-green-700 text-white' : 'bg-white text-green-700 border border-green-100'">業スー</button>
        </div>

        <div v-if="filteredGroups.length === 0" class="text-center text-gray-400 py-10 font-bold">
          該当する商品がありません
        </div>

        <div class="space-y-4">
          <div v-for="group in filteredGroups" :key="group.key" class="bg-white rounded-3xl p-5 shadow-sm border border-gray-100">
            <div class="flex items-center gap-4 cursor-pointer" @click="toggleExpand(group.key)">
              <div class="w-16 h-16 rounded-2xl bg-[#FFF3DB] flex items-center justify-center text-4xl shadow-inner shrink-0">
                {{ group.emoji }}
              </div>

              <div class="flex-1 min-w-0">
                <div class="text-xs font-bold text-gray-400 mb-1">{{ group.majorCategory }}</div>
                <h3 class="font-black text-gray-900 text-xl truncate mb-1">{{ group.subCategory }}</h3>
                <div class="text-sm font-bold text-gray-400 truncate mb-2">{{ group.productName }}</div>

                <div
